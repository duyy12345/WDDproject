<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - BCE System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            display: inline-block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        th:first-child { border-top-left-radius: 8px; }
        th:last-child  { border-top-right-radius: 8px; }

        tr:hover {
            background-color: #f8fafc;
            transition: background-color 0.2s ease;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-user  { background-color: #e2e8f0; color: #475569; }
        .role-admin { background-color: #dbeafe; color: #1e40af; }

        .error-message {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }

        .back-link {
            margin-top: 20px;
            text-decoration: none;
            color: #475569;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="table-container">
        <h2>Registered Users</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <tr><td colspan="3" style="text-align:center; color:#888; padding:20px;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <a href="webUI.html" class="back-link">&#8592; Back to Homepage</a>

    <script>
        // ── FIXED: Admin page guard ──
        const token = localStorage.getItem('token');
        const role  = localStorage.getItem('role');
        if (!token || role !== 'admin') {
            alert('Access denied. Admins only.');
            window.location.href = 'webUI.html';
        }

        // ── FIXED: Send JWT token in Authorization header ──
        fetch('http://127.0.0.1:5000/api/admin/users', {
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            }
        })
        .then(response => {
            if (response.status === 401 || response.status === 403) {
                // Token expired or not admin — redirect to login
                alert('Session expired. Please log in again.');
                window.location.href = 'webUI.html';
                throw new Error('Unauthorized');
            }
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(users => {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888; padding:20px;">No users registered yet.</td></tr>';
                return;
            }

            users.forEach(user => {
                const roleClass = user.role.toLowerCase() === 'admin' ? 'role-admin' : 'role-user';
                const row = `<tr>
                    <td><b>#${user.user_id}</b></td>
                    <td>${user.email}</td>
                    <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        })
        .catch(error => {
            if (error.message === 'Unauthorized') return; // Already handled above
            console.error('Error fetching users:', error);
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = `<tr><td colspan="3" class="error-message">
                Could not load users. Please make sure your Flask server (app.py) is running!
            </td></tr>`;
        });
    </script>

</body>
</html>
