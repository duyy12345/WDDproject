<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bristol Events Management</title>
    <!-- External Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="static/webUI.css">
</head>
<body>

    <header>
        <a href="#" class="logo"><i class="fas fa-ticket-alt"></i> BCE</a>
        <nav>
            <button id="nav-home" class="active" onclick="showHome()">Home</button>
            <button id="nav-login" onclick="showLogin()">Login</button>
            <button id="nav-logout" style="display:none;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>
    </header>

    <div id="main-content">
        <div class="hero">
            <h2>Discover Bristol's Best Events</h2>
            <p>Exhibitions, Workshops, Sports & Musicals - Book your tickets now!</p>
        </div>

        <div class="container">
            <div class="filter-bar">
                <input type="text" placeholder="Search events by name...">
                <select id="category-filter">
                    <option value="">All Categories</option>
                    <option value="Exhibitions">Exhibitions</option>
                    <option value="Workshops">Workshops</option>
                    <option value="Musical">Musical</option>
                    <option value="Sports">Sports</option>
                </select>
                <input type="date" title="Filter by date">
                <button><i class="fas fa-search"></i> Search</button>
            </div>

            <h3 class="section-title">Upcoming Events</h3>
            <div class="event-grid" id="events-container">
                <p style="text-align: center; grid-column: 1 / -1; color: #666;"><i class="fas fa-spinner fa-spin"></i> Loading events...</p>
            </div>
        </div>
    </div>

    <div id="login-section">
        <div class="login-container">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn-submit">Login / Sign In</button>
            </form>
            <p id="login-error" style="color: #ef4444; margin-top: 15px; font-weight: 500;"></p>
            
            <p style="margin-top: 20px; color: #666;">Don't have an account? <a href="#" class="auth-link" onclick="toggleAuthForms('signup')">Sign up here</a></p>
        </div>
    </div>

    <div id="signup-section">
        <div class="login-container">
            <h2>Create New Account</h2>
            <input type="email" id="signup-email" placeholder="Email Address" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button class="btn-submit" onclick="handleSignup()">Sign Up</button>
            
            <p style="margin-top: 20px; color: #666;">Already have an account? <a href="#" class="auth-link" onclick="toggleAuthForms('login')">Login here</a></p>
        </div>
    </div>

    <!-- Link to external JS -->
    <script src="static/webUI.js"></script>
</body>
</html>
