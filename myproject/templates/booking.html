<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets - Bristol Events Management</title>
    <!-- External Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to CSS -->
    <link rel="stylesheet" href="static/booking.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="webUI.html" class="logo">
            <i class="fas fa-ticket-alt"></i> BCE
        </a>
        <a href="webUI.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Events
        </a>
    </header>

    <main style="margin-top: 80px;">
        <!-- Event Info (Dynamic) -->
        <div class="event-info" id="eventInfo">
            <h1 id="eventTitle">Bristol Summer Festival</h1>
            <div class="event-meta">
                <div class="meta-item">
                    <i class="far fa-calendar-alt"></i>
                    <span id="eventDate">Sat, 15 Jun 2024</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="eventVenue">O2 Academy Bristol</span>
                </div>
            </div>
        </div>

        <!-- Booking Form -->
        <div class="booking-container">
            <h2><i class="fas fa-shopping-cart"></i> Complete Booking</h2>
            
            <form id="bookingForm" class="booking-form">
                <div class="date-selector">
                    <label for="datePicker">
                        <i class="fas fa-calendar-alt"></i> Available Dates
                    </label>
                    <input type="date" id="datePicker" min="2024-06-01" required>
                </div>
                
                <div class="ticket-selector">
                    <label>
                        Number of Tickets:
                        <input type="number" id="numTickets" min="1" max="10" value="1">
                    </label>
                    <label>
                        <input type="checkbox" id="studentDiscount">
                        Student Discount (10% off)
                        <small>*Bring student ID</small>
                    </label>
                </div>
                
                <div class="price-breakdown" id="priceBreakdown">
                    <div class="price-item">
                        <span class="price-label">Base Price (per ticket)</span>
                        <span class="price-value" id="basePrice">£25.00</span>
                    </div>
                    <div class="price-item">
                        <span class="price-label">Student Discount</span>
                        <span class="price-value" id="discount">£0.00</span>
                    </div>
                    <div class="price-item">
                        <span class="price-label">Total</span>
                        <span class="price-value" id="totalPrice">£25.00</span>
                    </div>
                </div>
                
                <button type="submit" class="btn-book-now" id="bookBtn">
                    <i class="fas fa-credit-card"></i>
                    Book Now £<span id="finalTotal">25.00</span>
                </button>
            </form>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle" style="font-size: 2rem; color: var(--success); margin-bottom: 1rem;"></i>
                <h3>Booking Confirmed!</h3>
                <p>Your tickets have been reserved. Check your email for confirmation.</p>
                <a href="webUI.html" class="back-btn" style="margin-top: 1rem; display: inline-block; width: 100%; text-align: center;">
                    <i class="fas fa-home"></i> Back to Events
                </a>
            </div>
        </div>
    </main>

    <!-- Link to JS -->
    <script src="booking.js"></script>
</body>
</html>
